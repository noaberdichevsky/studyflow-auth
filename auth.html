<!DOCTYPE html>
<html>
<head><title>StudyFlow Auth</title></head>
<body style="font-family:Arial;text-align:center;padding:40px;background:#f5f5f5;">
<h2 id="msg">מתחבר...</h2>
<button id="btn" style="display:none;padding:20px 40px;font-size:20px;background:#4CAF50;color:white;border:none;border-radius:12px;margin-top:20px;">
  ✅ חזרי לאפליקציה
</button>
<script>
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  if (code) {
    document.getElementById('msg').innerHTML = '✅ הכניסה בוצעה!';
    document.getElementById('btn').style.display = 'block';
    document.getElementById('btn').onclick = function() {
      window.location.replace('studyflowauth://callback?code=' + encodeURIComponent(code));
    };
  }
</script>
</body>
</html>
