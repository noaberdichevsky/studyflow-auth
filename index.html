<!DOCTYPE html>
<html>
<head><title>StudyFlow Auth</title></head>
<body style="font-family:Arial;text-align:center;padding:40px;">
<script>
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  if (code) {
    document.getElementById('msg').innerHTML = '✅ הכניסה בוצעה! לחצי כאן:';
    document.getElementById('btn').style.display = 'block';
    document.getElementById('btn').onclick = function() {
      navigator.clipboard.writeText(code).then(function() {
        window.history.back();
      }).catch(function() {
        alert('הועתק! חזרי לאפליקציה');
        window.history.back();
      });
    };
  }
</script>
<p id="msg">מתחבר...</p>
<button id="btn" style="display:none;padding:16px 32px;font-size:18px;background:#4CAF50;color:white;border:none;border-radius:8px;">
  ✅ לחצי כאן לסיום
</button>
</body>
</html>
