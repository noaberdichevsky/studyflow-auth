<!DOCTYPE html>
<html>
<head><title>StudyFlow Auth</title></head>
<body>
<script>
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  if (code) {
    var intentUrl = 'intent://oauth2redirect?code=' + encodeURIComponent(code) + 
                    '#Intent;scheme=com.companyname.studyflow;package=com.companyname.studyflow;end';
    window.location.replace(intentUrl);
  } else {
    document.write('No code found');
  }
</script>
<p>Redirecting to StudyFlow...</p>
</body>
</html>
