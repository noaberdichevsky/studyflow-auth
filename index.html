<!DOCTYPE html>
<html>
<head><title>StudyFlow Auth</title></head>
<body>
<script>
  var hash = window.location.hash.substring(1);
  var params = new URLSearchParams(hash);
  var token = params.get('access_token');
  if (token) {
    window.location.replace('https://noaberdichevsky.github.io/studyflow-auth/?access_token=' + token);
  }
</script>
<p>Redirecting...</p>
</body>
</html>
