<!DOCTYPE html>
<html>
<head><title>StudyFlow Auth</title></head>
<body style="font-family:Arial;text-align:center;padding:40px;background:#f0f0f0;">
<script>
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  if (code) {
    navigator.clipboard.writeText(code).then(function() {
      document.body.innerHTML = '<h2 style="color:green">✅ הכניסה בוצעה!</h2><p style="font-size:20px">כעת חזרי לאפליקציה StudyFlow</p>';
    });
  }
</script>
<p>מתחבר...</p>
</body>
</html>
