<!DOCTYPE html>
<html>
<head><title>StudyFlow Auth</title></head>
<body>
<h2>אנא המתן...</h2>
<script>
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  if (code) {
    navigator.clipboard.writeText(code).then(function() {
      document.body.innerHTML = '<h2>✅ הכניסה בוצעה! חזור לאפליקציה StudyFlow</h2>';
    });
  } else {
    document.body.innerHTML = '<h2>❌ שגיאה: לא נמצא קוד</h2>';
  }
</script>
</body>
</html>
